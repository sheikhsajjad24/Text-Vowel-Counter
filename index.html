<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vowel Counter</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        body{
            margin: 20px 0px;
            text-align: center;
        }
        h1{
            font-size: 60px;
            padding-bottom: 20px;
        }
        .main{
            padding: 10px 0px;
        }
        input{
            width: 60%;
            padding: 10px;
            font-size: 18px;
            
        }
        #check{
            margin-top: 20px;
            padding: 6px 12px;
            font-weight: bold;
            font-size: 20px;
            border: none;
            text-transform: capitalize;
            border-radius: 10px;
            background-color: rgb(143, 224, 21);
        }
        @media (max-width: 480px) {
     h1{
          font-size: 50px;
            padding-bottom: 15px;
     }
    input{
            width: 80%;

    }
}
    </style>
</head>
<body>
   <h1>Vowel Counter</h1>
   <div class="main">
     <input type="text" placeholder="Enter a piece of text" id="usrinp">
  
   </div>
      <button id="check">check</button>
</body>
<script src="vowel.js"></script>
</html>
